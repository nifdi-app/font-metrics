name: Build & Release metrics-only fonts

# Cut a release either by:
#   * pushing a version tag:  git tag v1.0.0 && git push origin v1.0.0
#   * or running it manually (Actions tab / API workflow_dispatch) with
#     `version` set to the release tag and `publish` left at "true" — the job
#     creates the tag at the built commit and publishes the Release itself
#     (using the built-in GITHUB_TOKEN, so no local tag-push is required).
# Set `publish` to "false" (and optionally a `limit`/`families`) for a
# build-and-verify dry run that only uploads workflow artifacts.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag / version (e.g. v1.0.0), also recorded in the manifest"
        required: false
        default: "v1.0.0"
      publish:
        description: "Publish a GitHub Release ('true') or just build+verify ('false')"
        required: false
        default: "true"
      google_fonts_ref:
        description: "google/fonts branch or tag to build from"
        required: false
        default: "main"
      limit:
        description: "Build at most N families (0 = all). Use for a quick test."
        required: false
        default: "0"
      families:
        description: "Comma-separated family names to build (exact match; blank = all)"
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install verifier deps
        working-directory: verify
        run: npm ci

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build metrics-only catalog
        run: |
          python scripts/build.py \
            --clone \
            --fonts-repo work/fonts \
            --google-fonts-ref "${{ github.event.inputs.google_fonts_ref || 'main' }}" \
            --version "${{ steps.version.outputs.value }}" \
            --limit "${{ github.event.inputs.limit || '0' }}" \
            --families "${{ github.event.inputs.families || '' }}"

      - name: Verify (sanity + parity gate)
        working-directory: verify
        run: node verify.mjs --parity ../build/refs/parity.json --fonts ../build/out/fonts --refs ../build/refs

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: google-font-metrics
          path: |
            dist/google-font-metrics.tar.gz
            dist/manifest.json
          if-no-files-found: error

      - name: Publish GitHub Release
        if: ${{ github.ref_type == 'tag' || (github.event_name == 'workflow_dispatch' && github.event.inputs.publish == 'true') }}
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.version.outputs.value }}
        run: |
          COUNT=$(jq -r '.count' dist/manifest.json)
          SRC=$(jq -r '.sourceCommit' dist/manifest.json)
          SIZE=$(du -h dist/google-font-metrics.tar.gz | cut -f1)
          cat > notes.md <<EOF
          Metrics-only derivatives of Google Fonts (Regular / weight 400).

          - **Families:** ${COUNT}
          - **Source:** google/fonts @ \`${SRC}\`
          - **Archive size:** ${SIZE}

          Download \`google-font-metrics.tar.gz\`, expand it, and look up files by
          canonical family name via \`manifest.json\`. See the repository README
          for consumer instructions. These files carry emptied glyph outlines and
          preserve metric tables only; each family's license travels in the
          archive under \`licenses/\`.
          EOF
          # On a tag push the tag already exists; on workflow_dispatch, --target
          # makes gh create the tag at the built commit. GITHUB_TOKEN publishes
          # the release server-side, so no local tag push is needed.
          gh release create "${RELEASE_TAG}" \
            dist/google-font-metrics.tar.gz \
            dist/manifest.json \
            --title "${RELEASE_TAG}" \
            --notes-file notes.md \
            --target "${GITHUB_SHA}"
